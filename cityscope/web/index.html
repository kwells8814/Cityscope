<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CityScope — tap in</title>
<!-- PWA: installable, home-screen icon, fullscreen on launch -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#252A34">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CityScope">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Cool things happening in any city, from forum chatter and local papers.">
<style>
  /* respect the iPhone notch / safe areas in standalone mode */
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Archivo+Narrow:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    /* dark-mode neon palette */
    --ink:#EAEAEA; --ink-soft:#9aa0aa;          /* text on dark */
    --paper:#252A34; --paper-2:#2e343f;          /* charcoal bg + grid/surface */
    --amber:#08D9D6; --teal:#F0A500; --rose:#FF2E63; --lime:#7CD957;  /* events / gems / happenings / eats */
    --line:#3a414d; --stamp:#6b7280;             /* borders + postmarks */
    --on-accent:#1b1f27;                          /* dark text on bright cyan/gold */
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(var(--paper-2) 1px,transparent 1px);
    background-size:22px 22px;
  }
  .screen{display:none;min-height:100%}
  .screen.active{display:block}

  /* ============ SCREEN 1: THE DOOR ============ */
  #door{
    display:none;min-height:100vh;
    flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;position:relative;overflow:hidden;
  }
  #door.active{display:flex}
  .door-mark{
    font-weight:900;font-size:clamp(40px,11vw,96px);line-height:.85;
    letter-spacing:-.04em;font-stretch:condensed;margin-bottom:10px;
  }
  .door-mark .scope{color:var(--amber)}
  .door-sub{
    font-family:'Archivo Narrow',sans-serif;font-size:clamp(15px,3vw,20px);
    color:var(--ink-soft);max-width:30ch;margin:0 auto 48px;line-height:1.4;
  }
  /* the big button */
  .tapin{
    --r:128px;width:var(--r);height:var(--r);border-radius:50%;
    border:3px solid var(--amber);background:var(--amber);color:var(--on-accent);
    font-family:'Archivo',sans-serif;font-weight:900;font-size:21px;
    letter-spacing:-.01em;cursor:pointer;position:relative;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease, background .2s ease, color .2s ease;
  }
  .tapin:hover{background:#3ee9e6;border-color:#3ee9e6;color:var(--on-accent);transform:scale(1.04)}
  .tapin:active{transform:scale(.97)}
  .tapin::before,.tapin::after{
    content:"";position:absolute;inset:-3px;border-radius:50%;
    border:2px solid var(--ink);opacity:.0;
  }
  .tapin-wrap{position:relative;display:inline-flex}
  .tapin-wrap::after{
    content:"";position:absolute;inset:-10px;border-radius:50%;
    border:2px solid var(--amber);animation:ring 2.4s ease-out infinite;pointer-events:none;
  }
  @keyframes ring{0%{transform:scale(.85);opacity:.7}100%{transform:scale(1.5);opacity:0}}
  .door-foot{
    position:absolute;bottom:26px;left:0;right:0;
    font-family:'JetBrains Mono',monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:.14em;color:var(--stamp);
  }

  /* ============ SCREEN 2: LOCATE ============ */
  #locate{padding:32px;min-height:100vh;display:none;flex-direction:column;justify-content:center;max-width:560px;margin:0 auto}
  #locate.active{display:flex}
  .back{
    background:none;border:none;font-family:'JetBrains Mono',monospace;font-size:12px;
    color:var(--ink-soft);cursor:pointer;letter-spacing:.06em;padding:0;margin-bottom:34px;
    position:absolute;top:28px;left:28px;
  }
  .back:hover{color:var(--ink)}
  .locate-h{font-weight:900;font-size:clamp(28px,6vw,44px);letter-spacing:-.02em;line-height:1;margin-bottom:8px}
  .locate-d{font-family:'Archivo Narrow',sans-serif;font-size:17px;color:var(--ink-soft);margin-bottom:34px}

  .gps{
    width:100%;display:flex;align-items:center;gap:14px;
    background:var(--amber);color:var(--on-accent);border:3px solid var(--amber);
    padding:20px 22px;cursor:pointer;font-family:'Archivo',sans-serif;
    font-weight:900;font-size:19px;letter-spacing:-.01em;margin-bottom:22px;
    transition:background .15s ease,color .15s ease;
  }
  .gps:hover{background:#3ee9e6;border-color:#3ee9e6;color:var(--on-accent)}
  .gps svg{flex:0 0 auto}
  .gps small{display:block;font-family:'Archivo Narrow',sans-serif;font-weight:500;font-size:13px;opacity:.7;letter-spacing:0}

  .or{display:flex;align-items:center;gap:14px;margin:6px 0 22px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stamp);
    text-transform:uppercase;letter-spacing:.16em}
  .or::before,.or::after{content:"";height:1px;background:var(--line);flex:1}

  .entry{display:flex;gap:10px;margin-bottom:14px}
  .ac-wrap{position:relative;flex:1;min-width:0}
  .entry input{
    width:100%;font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;
    background:var(--paper);border:2px solid var(--ink);color:var(--ink);
    padding:13px 15px;border-radius:0;min-width:0;
  }
  #zipInput{flex:1}
  .entry input::placeholder{color:var(--stamp);font-weight:500}
  /* autocomplete dropdown */
  .ac-list{
    position:absolute;left:0;right:0;top:100%;z-index:50;
    background:var(--paper-2);border:2px solid var(--amber);border-top:none;
    max-height:280px;overflow-y:auto;display:none;
  }
  .ac-list.open{display:block}
  .ac-item{
    padding:11px 15px;cursor:pointer;display:flex;align-items:baseline;gap:8px;
    border-bottom:1px solid var(--line);
  }
  .ac-item:last-child{border-bottom:none}
  .ac-item .ac-city{font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;color:var(--ink)}
  .ac-item .ac-state{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);font-weight:700}
  .ac-item .ac-dupe{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--stamp);margin-left:auto;text-transform:uppercase;letter-spacing:.06em}
  .ac-item:hover,.ac-item.active{background:var(--amber)}
  .ac-item:hover .ac-city,.ac-item.active .ac-city{color:var(--on-accent)}
  .ac-item:hover .ac-state,.ac-item.active .ac-state{color:var(--on-accent)}
  .ac-item:hover .ac-dupe,.ac-item.active .ac-dupe{color:var(--on-accent)}
  .entry button{
    font-family:'Archivo',sans-serif;font-weight:900;font-size:16px;
    background:var(--amber);color:var(--on-accent);border:2px solid var(--amber);
    padding:0 20px;cursor:pointer;transition:background .15s ease,color .15s ease;
  }
  .entry button:hover{background:#3ee9e6;border-color:#3ee9e6;color:var(--on-accent)}
  .hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stamp);margin-top:4px}
  .locate-msg{font-family:'Archivo Narrow',sans-serif;font-size:15px;color:var(--rose);margin-top:16px;min-height:20px}

  /* ============ SCREEN 3: FEED ============ */
  #feed-screen{display:none}
  #feed-screen.active{display:block}
  .fhead{
    border-bottom:2px solid var(--ink);max-width:1180px;margin:0 auto;
    padding:22px clamp(18px,5vw,56px) 0;
  }
  .fhead-top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;justify-content:space-between}
  .fmark{font-weight:900;font-size:28px;letter-spacing:-.03em;cursor:pointer}
  .fmark .scope{color:var(--amber)}
  .change{
    font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.1em;background:none;border:1.5px solid var(--line);color:var(--ink-soft);
    padding:7px 12px;cursor:pointer;border-radius:100px;transition:all .12s}
  .change:hover{border-color:var(--ink);color:var(--ink)}
  .place{
    font-weight:900;font-size:clamp(26px,5vw,42px);letter-spacing:-.02em;
    margin:18px 0 4px;line-height:1;
  }
  .src-note{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--stamp);
    letter-spacing:.04em;margin-bottom:18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .src-note .badge{border:1px solid var(--line);padding:2px 7px;border-radius:3px}

  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 0 20px}
  .chip{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
    text-transform:uppercase;letter-spacing:.08em;border:1.5px solid var(--line);
    background:transparent;color:var(--ink-soft);padding:6px 12px;cursor:pointer;
    border-radius:100px;transition:all .12s}
  .chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip[data-cat="event"][aria-pressed="true"]{background:var(--amber);border-color:var(--amber);color:var(--on-accent)}
  .chip[data-cat="gem"][aria-pressed="true"]{background:var(--teal);border-color:var(--teal);color:var(--on-accent)}
  .chip[data-cat="news"][aria-pressed="true"]{background:var(--rose);border-color:var(--rose);color:#fff}
  .chip[data-cat="food"][aria-pressed="true"]{background:var(--lime);border-color:var(--lime);color:var(--on-accent)}

  main{max-width:1180px;margin:0 auto;padding:24px clamp(18px,5vw,56px) 80px}
  .count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:20px;letter-spacing:.04em}
  .feed{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(310px,1fr))}

  .card{position:relative;background:var(--paper);border:2px solid var(--ink);
    padding:20px 20px 16px;display:flex;flex-direction:column;transition:transform .12s ease, box-shadow .12s ease}
  .card:hover{transform:translate(-3px,-3px);box-shadow:5px 5px 0 var(--amber)}
  .card a.wrap{text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:12px;height:100%}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px}
  .card[data-cat="event"]::before{background:var(--amber)}
  .card[data-cat="gem"]::before{background:var(--teal)}
  .card[data-cat="news"]::before{background:var(--rose)}
  .card[data-cat="food"]::before{background:var(--lime)}
  .kicker{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:.13em}
  .card[data-cat="event"] .kicker{color:var(--amber)}
  .card[data-cat="gem"] .kicker{color:var(--teal)}
  .card[data-cat="news"] .kicker{color:var(--rose)}
  .card[data-cat="food"] .kicker{color:var(--lime)}
  .title{font-weight:700;font-size:19px;line-height:1.18;letter-spacing:-.01em}
  .summary{font-family:'Archivo Narrow',sans-serif;font-size:15px;line-height:1.42;color:var(--ink-soft);margin-top:-2px}
  .meta{margin-top:auto;display:flex;flex-wrap:wrap;gap:6px 8px;align-items:center;padding-top:8px;border-top:1px dashed var(--line)}
  .pill{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;padding:3px 8px;
    border:1px solid var(--line);border-radius:3px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:5px}
  .pill.when{border-color:var(--ink);color:var(--ink);font-weight:700}
  .pill.free{background:var(--teal);color:var(--on-accent);border-color:var(--teal)}
  .live{display:inline-flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);position:relative}
  .dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--amber);animation:pulse 1.6s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.7);opacity:.9}100%{transform:scale(1.9);opacity:0}}
  .stamp{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:.08em;color:var(--stamp);border:1.5px solid var(--stamp);padding:2px 7px;border-radius:2px;transform:rotate(-2deg);margin-left:auto}
  .stamp.paper{color:var(--rose);border-color:var(--rose);transform:rotate(1.5deg)}
  .stamp.sky{color:var(--amber);border-color:var(--amber);transform:rotate(-1deg)}

  /* add-to-calendar button on event cards */
  .calbtn{
    margin-top:12px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:7px;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    background:transparent;color:var(--ink);border:1.5px solid var(--ink);padding:9px 12px;cursor:pointer;
    transition:background .14s ease,color .14s ease;
  }
  .calbtn:hover{background:var(--amber);border-color:var(--amber);color:var(--on-accent)}
  .calbtn.added{background:var(--teal);border-color:var(--teal);color:var(--on-accent)}
  .card .wrap{flex:1}

  /* state panels (ambiguous / none / quiet) */
  .panel{grid-column:1/-1;border:2px dashed var(--line);padding:34px 26px;text-align:center}
  .panel h3{font-weight:900;font-size:22px;margin:0 0 8px;letter-spacing:-.01em}
  .panel p{font-family:'Archivo Narrow',sans-serif;font-size:16px;color:var(--ink-soft);margin:0 0 18px}
  .alts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .alt{font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;background:var(--paper);
    border:2px solid var(--ink);padding:10px 18px;cursor:pointer;transition:background .15s,color .15s}
  .alt:hover{background:var(--amber);border-color:var(--amber);color:var(--on-accent)}
  .quiet-banner{grid-column:1/-1;background:var(--paper-2);border:1.5px solid var(--line);
    padding:12px 16px;font-family:'Archivo Narrow',sans-serif;font-size:14px;color:var(--ink-soft);margin-bottom:2px}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media(max-width:520px){
    .feed{grid-template-columns:1fr}
    .entry{flex-direction:column}.entry button{padding:13px}
  }
</style>
</head>
<body>

<!-- SCREEN 1: DOOR -->
<section id="door" class="active">
  <div class="door-mark">City<span class="scope">Scope</span></div>
  <p class="door-sub">The cool stuff people actually talk about — wherever you are.</p>
  <div class="tapin-wrap">
    <button class="tapin" id="tapin">Tap in</button>
  </div>
  <div class="door-foot">forum chatter, not event calendars</div>
</section>

<!-- SCREEN 2: LOCATE -->
<section id="locate">
  <button class="back" data-to="door">← back</button>
  <h1 class="locate-h">Where are you?</h1>
  <p class="locate-d">We'll dig up what's happening in your corner of the world.</p>

  <button class="gps" id="gps">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 8 12 8 12s8-6.6 8-12a8 8 0 0 0-8-8z"/></svg>
    <span>Use my location<small>fastest — no typing</small></span>
  </button>

  <div class="or">or</div>

  <div class="entry">
    <div class="ac-wrap">
      <input id="cityInput" type="text" placeholder="Enter a city (e.g. Asheville)" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false">
      <div id="acList" class="ac-list" role="listbox"></div>
    </div>
    <button data-mode="city">Go</button>
  </div>
  <div class="entry">
    <input id="zipInput" type="text" inputmode="numeric" placeholder="…or a ZIP code" autocomplete="off" maxlength="5">
    <button data-mode="zip">Go</button>
  </div>
  <div class="hint">Start typing a city — pick from the list to choose the right state</div>
  <div class="locate-msg" id="locateMsg"></div>
</section>

<!-- SCREEN 3: FEED -->
<section id="feed-screen">
  <div class="fhead">
    <div class="fhead-top">
      <div class="fmark" id="homeMark">City<span class="scope">Scope</span></div>
      <button class="change" id="changeCity">Change city</button>
    </div>
    <div class="place" id="placeName"></div>
    <div class="src-note" id="srcNote"></div>
    <div class="chips" id="chips">
      <button class="chip" data-cat="all" aria-pressed="true">Everything</button>
      <button class="chip" data-cat="event" aria-pressed="false">Events &amp; gigs</button>
      <button class="chip" data-cat="gem" aria-pressed="false">Hidden gems</button>
      <button class="chip" data-cat="news" aria-pressed="false">Local happenings</button>
      <button class="chip" data-cat="food" aria-pressed="false">Local eats</button>
    </div>
  </div>
  <main>
    <div class="count" id="count"></div>
    <div class="feed" id="feed"></div>
  </main>
</section>

<script>
/* ===================================================================
   DATA SOURCE
   Auto-detecting:
   - Served from the CityScope backend (deployed) -> uses the live API
     at the same origin (relative paths, no CORS).
   - Opened as a plain file:// or static host with no API -> falls back
     to the embedded sample data so it still works.
   Each call tries the API first and falls back if it's unreachable.
   =================================================================== */
// "" = same origin (works when the backend serves this page). The app probes
// /status once on load; if that fails, it switches to embedded-data mode.
let API_BASE = "";
let LIVE = false;   // set true after a successful health probe

async function probeApi(){
  try{
    const r = await fetch(`${API_BASE}/status`, {cache:"no-store"});
    LIVE = r.ok;
  }catch(_){ LIVE = false; }
}
const DATA = {"seed": {}, "meta": {}, "geo": {"cities": {"Austin": {"lat":30.2672,"lng":-97.7431,"region":"TX"}, "Chicago": {"lat":41.8781,"lng":-87.6298,"region":"IL"}, "Durham": {"lat":35.994,"lng":-78.8986,"region":"NC"}, "Asheville": {"lat":35.5951,"lng":-82.5515,"region":"NC"}, "Seattle": {"lat":47.6062,"lng":-122.3321,"region":"WA"}, "Portland": {"lat":45.5152,"lng":-122.6784,"region":"OR"}}, "zips": {"78701": {"city":"Austin","region":"TX"}, "60601": {"city":"Chicago","region":"IL"}, "27701": {"city":"Durham","region":"NC"}, "28801": {"city":"Asheville","region":"NC"}}}};

const CAT_LABEL = {event:"Events & gigs", gem:"Hidden gems", news:"Local happenings", food:"Local eats"};
let activeCat = "all";
let current = [];      // current happenings
let currentMeta = {};  // {city, region, status, note, subreddits}

/* ---------- screen routing ---------- */
function go(id){
  document.querySelectorAll(".screen,#door,#locate,#feed-screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

/* ---------- resolve: name / zip / gps -> city ---------- */
function haversine(a,b,c,d){
  const R=6371,r=x=>x*Math.PI/180;
  const dl=r(c-a),dn=r(d-b);
  const x=Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function nearestCity(lat,lng){
  let best=null,bd=1e9;
  for(const [name,v] of Object.entries(DATA.geo.cities)){
    const dist=haversine(lat,lng,v.lat,v.lng);
    if(dist<bd){bd=dist;best={city:name,region:v.region,dist};}
  }
  return best;
}
async function resolveLocal({city,zip,lat,lng,region}){
  if(LIVE){
    try{
      const qs=new URLSearchParams();
      if(city)qs.set("city",city); if(zip)qs.set("zip",zip);
      if(region)qs.set("region",region);
      if(lat!=null){qs.set("lat",lat);qs.set("lng",lng);}
      const r=await fetch(`${API_BASE}/resolve?${qs}`);
      if(r.ok){ const j=await r.json(); if(region&&!j.region)j.region=region; return j; }
    }catch(_){ /* fall through to embedded */ }
  }
  if(city) return {city,region:region||null,note:null};
  if(zip){
    const hit=DATA.geo.zips[String(zip).slice(0,5)];
    return hit?{city:hit.city,region:hit.region,note:null}
              :{city:null,note:`ZIP ${zip} isn't in the demo data — try a city name.`};
  }
  if(lat!=null){
    const n=nearestCity(lat,lng);
    return {city:n.city,region:n.region,note:n.dist>60?`Nearest covered city is ${n.city} (~${Math.round(n.dist)} km away).`:null};
  }
  return {city:null,note:"Need a city, ZIP, or location."};
}

/* ---------- fetch happenings for a resolved city ---------- */
function keyFor(city,region){
  const k=city.toLowerCase();
  if(k==="portland" && region) return "portland-"+region.toLowerCase();
  return k;
}
async function fetchHappenings(city,region){
  if(LIVE){
    try{
      const qs=new URLSearchParams({city}); if(region)qs.set("region",region);
      const r=await fetch(`${API_BASE}/happenings?${qs}`);
      if(r.ok) return await r.json();
    }catch(_){ /* fall through to embedded */ }
  }
  // standalone: look up embedded results
  // ambiguity: bare "Portland" with no region -> offer choice
  if(city.toLowerCase()==="portland" && !region){
    return {city,status:"ambiguous",happenings:[],
      alternatives:[{region:"OR",example_sub:"Portland",subscribers:520000},
                    {region:"ME",example_sub:"PortlandMaine",subscribers:34000}],
      note:"More than one Portland. Which one?"};
  }
  const key=keyFor(city,region);
  const m=DATA.meta[key];
  const h=DATA.seed[key];
  if(!m||!h) return {city,status:"none",happenings:[],note:`Waking up the server… if this persists, try again in a moment.`};
  return {city,region,status:m.status,note:m.note,subreddits:m.subreddits,sources:m.sources||[],happenings:h};
}

/* ---------- rendering ---------- */
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function isTonight(h){const w=(h.when||"").toLowerCase();return w.includes("tonight")||w.includes("today");}

/* ---- client-side .ics generation (standalone mode) ---- */
const WK={monday:0,tuesday:1,wednesday:2,thursday:3,friday:4,saturday:5,sunday:6};
function parseWhen(when){
  if(!when) return {start:null,hasTime:false};
  const w=when.toLowerCase(); const now=new Date(); let day=null;
  if(w.includes("today")||w.includes("tonight")) day=new Date(now);
  else if(w.includes("tomorrow")){day=new Date(now);day.setDate(day.getDate()+1);}
  else{for(const[n,i]of Object.entries(WK)){if(w.includes(n)){day=new Date(now);day.setDate(day.getDate()+((i-day.getDay()+7)%7));break;}}}
  if(!day&&(w.includes("weekend"))){day=new Date(now);day.setDate(day.getDate()+((5-day.getDay()+7)%7));}
  if(!day&&w.includes("this week")) day=new Date(now);
  if(!day) return {start:null,hasTime:false};
  const m=w.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/);
  if(m){let h=parseInt(m[1])%12; if(m[3]==="pm")h+=12; day.setHours(h,parseInt(m[2]||"0"),0,0); return {start:day,hasTime:true};}
  day.setHours(0,0,0,0); return {start:day,hasTime:false};
}
function pad(n){return String(n).padStart(2,"0");}
function fmtDT(d){return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;}
function fmtDATE(d){return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;}
function icsEscape(s){return (s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");}
function buildICS(h){
  const {start,hasTime}=parseWhen(h.when);
  const stamp=fmtDT(new Date())+"Z";
  const uid="cityscope-"+Math.abs(hashStr(h.title+(h.when||"")))+"@cityscope.app";
  let L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CityScope//EN","CALSCALE:GREGORIAN","BEGIN:VEVENT",
    "UID:"+uid,"DTSTAMP:"+stamp,"SUMMARY:"+icsEscape(h.title)];
  if(start&&hasTime){const e=new Date(start.getTime()+2*3600*1000);L.push("DTSTART:"+fmtDT(start),"DTEND:"+fmtDT(e));}
  else if(start){const e=new Date(start.getTime()+86400000);L.push("DTSTART;VALUE=DATE:"+fmtDATE(start),"DTEND;VALUE=DATE:"+fmtDATE(e));}
  else{L.push("DTSTART;VALUE=DATE:"+fmtDATE(new Date()));}
  let desc=h.summary||""; if(!(start&&hasTime)&&h.when)desc=(desc+`\n\n(Time approximate — listing said: ${h.when})`).trim();
  if(desc)L.push("DESCRIPTION:"+icsEscape(desc));
  if(h.url)L.push("URL:"+icsEscape(h.url));
  L.push("END:VEVENT","END:VCALENDAR");
  return L.join("\r\n")+"\r\n";
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return h;}
function downloadICS(h){
  if(LIVE){
    const qs=new URLSearchParams({title:h.title,when:h.when||"",summary:h.summary||"",url:h.url||""});
    window.location.href=`${API_BASE}/ics?${qs}`; return;
  }
  const blob=new Blob([buildICS(h)],{type:"text/calendar"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="event.ics"; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
}

const ORIGIN_LABEL={reddit:"Reddit",rss:"Local paper",bluesky:"Bluesky"};

function cardHTML(h,idx){
  const pills=[];
  if(h.when) pills.push(`<span class="pill when">${isTonight(h)?`<span class="live"><span class="dot"></span>${esc(h.when)}</span>`:esc(h.when)}</span>`);
  if(h.is_free) pills.push(`<span class="pill free">FREE</span>`);
  else if(h.price) pills.push(`<span class="pill">${esc(h.price)}</span>`);
  if(h.origin==="reddit" && h.score) pills.push(`<span class="pill">▲ ${h.score}</span>`);
  if(h.origin==="bluesky" && h.score) pills.push(`<span class="pill">♥ ${h.score}</span>`);
  const cal = (h.category==="event")
    ? `<button class="calbtn" data-idx="${idx}" title="Add to calendar">
         <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
         Add to calendar</button>` : "";
  const stampClass = h.origin==='rss' ? 'paper' : (h.origin==='bluesky' ? 'sky' : '');
  return `<article class="card" data-cat="${h.category}" data-origin="${h.origin||'reddit'}">
    <a class="wrap" href="${h.url}" target="_blank" rel="noopener">
      <span class="kicker">${CAT_LABEL[h.category]||h.category}</span>
      <div class="title">${esc(h.title)}</div>
      <div class="summary">${esc(h.summary)}</div>
      <div class="meta">${pills.join("")}<span class="stamp ${stampClass}">${esc(h.source)}</span></div>
    </a>
    ${cal}
  </article>`;
}

function renderFeed(){
  const feed=document.getElementById("feed");
  const m=currentMeta;
  document.getElementById("placeName").textContent = m.displayCity || m.city || "";

  // source note line — now shows ALL contributing sources, not just Reddit
  const note=document.getElementById("srcNote");
  if(m.status==="ok"||m.status==="quiet"){
    // Show which sources actually contributed, not Reddit subreddits.
    let parts=[];
    (m.sources||[]).forEach(s=>{
      if(s.count>0 && s.status==="ok") parts.push(`${esc(s.label)} (${s.count})`);
    });
    note.innerHTML = parts.length
      ? `<span class="badge">sources</span> ${parts.join("  ·  ")}`
      : "";
  } else note.innerHTML="";

  // ambiguous / none -> panel
  if(m.status==="ambiguous"){
    document.getElementById("count").textContent="";
    feed.innerHTML = `<div class="panel"><h3>More than one ${esc(m.city)}</h3>
      <p>Which one did you mean?</p><div class="alts">
      ${m.alternatives.map(a=>`<button class="alt" data-region="${a.region}">${esc(m.city)}, ${a.region}</button>`).join("")}
      </div></div>`;
    feed.querySelectorAll(".alt").forEach(b=>b.addEventListener("click",()=>{
      loadCity(m.city, b.dataset.region);
    }));
    return;
  }
  if(m.status==="none"){
    document.getElementById("count").textContent="";
    feed.innerHTML = `<div class="panel"><h3>It's quiet out there</h3>
      <p>${esc(m.note||"No active community found for "+m.city+".")}</p>
      <div class="alts"><button class="alt" id="tryAnother">Try another place</button></div></div>`;
    feed.querySelector("#tryAnother").addEventListener("click",()=>go("locate"));
    return;
  }

  const items = activeCat==="all"?current:current.filter(h=>h.category===activeCat);
  document.getElementById("count").textContent =
    items.length?`${items.length} thing${items.length>1?"s":""} worth knowing`:"";

  let html="";
  if(m.status==="quiet"){
    html += `<div class="quiet-banner">⚠ ${esc(m.note||"This place is small or quiet — results may be thin.")}</div>`;
  }
  html += items.length? items.map((h,i)=>cardHTML(h,i)).join("")
        : `<div class="panel"><h3>Nothing in this lane</h3><p>Try another filter.</p></div>`;
  feed.innerHTML=html;

  // wire calendar buttons (event cards only)
  feed.querySelectorAll(".calbtn").forEach(b=>b.addEventListener("click",e=>{
    e.preventDefault(); e.stopPropagation();
    const idx=parseInt(b.dataset.idx,10);
    downloadICS(items[idx]);
    b.classList.add("added"); b.innerHTML="✓ Added";
    setTimeout(()=>{b.classList.remove("added");},2000);
  }));
}

/* ---------- load a city end to end ---------- */
async function loadCity(city, region){
  const data = await fetchHappenings(city, region);
  current = data.happenings || [];
  currentMeta = {
    city: data.city||city, region:region||data.region||null,
    displayCity: (region||data.region) ? `${data.city||city}, ${region||data.region}` : (data.city||city),
    status:data.status, note:data.note||data.discovery_note,
    subreddits:data.subreddits||[], alternatives:data.alternatives||[],
    sources:data.sources||[],
  };
  activeCat="all";
  document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed", c.dataset.cat==="all"?"true":"false"));
  go("feed-screen");
  renderFeed();
}

/* ---------- locate actions ---------- */
function setMsg(t){document.getElementById("locateMsg").textContent=t||"";}

async function doResolve(opts){
  setMsg("");
  const r = await resolveLocal(opts);
  if(!r.city){ setMsg(r.note||"Couldn't figure that out — try a city name."); return; }
  if(r.note) setMsg(r.note);
  loadCity(r.city, r.region);
}

// names that appear in more than one state (so we always show the state for them)
const _DUPE_NAMES = (()=>{const c={};US_CITIES.forEach(([n])=>c[n]=(c[n]||0)+1);
  return new Set(Object.keys(c).filter(n=>c[n]>1));})();

const cityInput=document.getElementById("cityInput");
const acList=document.getElementById("acList");
let acMatches=[]; let acActive=-1;

function acFilter(q){
  q=q.trim().toLowerCase();
  if(!q) return [];
  const starts=[], contains=[];
  for(const [c,s] of US_CITIES){
    const cl=c.toLowerCase();
    if(cl.startsWith(q)) starts.push([c,s]);
    else if(cl.includes(q)) contains.push([c,s]);
    if(starts.length>=8) break;
  }
  return starts.concat(contains).slice(0,8);
}

function acRender(){
  if(!acMatches.length){ acClose(); return; }
  acList.innerHTML = acMatches.map(([c,s],i)=>{
    const dupe = _DUPE_NAMES.has(c) ? `<span class="ac-dupe">${c} also in other states</span>` : "";
    return `<div class="ac-item${i===acActive?' active':''}" role="option" data-i="${i}">
      <span class="ac-city">${esc(c)}</span><span class="ac-state">${esc(s)}</span>${dupe}</div>`;
  }).join("");
  acList.classList.add("open");
  cityInput.setAttribute("aria-expanded","true");
  acList.querySelectorAll(".ac-item").forEach(el=>{
    el.addEventListener("mousedown",ev=>{ // mousedown beats blur
      ev.preventDefault();
      acPick(parseInt(el.dataset.i,10));
    });
  });
}
function acClose(){ acList.classList.remove("open"); cityInput.setAttribute("aria-expanded","false"); acActive=-1; }

function acPick(i){
  const m=acMatches[i]; if(!m) return;
  const [c,s]=m;
  cityInput.value = `${c}, ${s}`;
  acClose();
  // pass the state as region so same-name cities never hit the "which one?" screen
  doResolve({city:c, region:s});
}

function acChooseTopOrText(){
  if(acMatches.length){ acPick(acActive>=0?acActive:0); return; }
  const v=cityInput.value.trim();
  if(!v) return;
  // allow "City, ST" typed manually
  const m=v.match(/^(.+),\s*([A-Za-z]{2})$/);
  if(m) doResolve({city:m[1].trim(), region:m[2].toUpperCase()});
  else doResolve({city:v});
}

cityInput.addEventListener("input",()=>{
  acMatches=acFilter(cityInput.value); acActive=-1; acRender();
});
cityInput.addEventListener("keydown",e=>{
  if(acList.classList.contains("open") && acMatches.length){
    if(e.key==="ArrowDown"){e.preventDefault();acActive=(acActive+1)%acMatches.length;acRender();return;}
    if(e.key==="ArrowUp"){e.preventDefault();acActive=(acActive-1+acMatches.length)%acMatches.length;acRender();return;}
    if(e.key==="Escape"){acClose();return;}
  }
  if(e.key==="Enter"){ e.preventDefault(); acChooseTopOrText(); }
});
cityInput.addEventListener("blur",()=>setTimeout(acClose,120));

document.getElementById("chips").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b)return;
  activeCat=b.dataset.cat;
  document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed",c===b?"true":"false"));
  renderFeed();
});

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then((reg)=>{
      // Check for an updated worker every load, and proactively.
      reg.update().catch(()=>{});
      reg.addEventListener("updatefound",()=>{
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener("statechange",()=>{
          // A new worker has installed and is ready to control the page.
          if(nw.state==="installed" && navigator.serviceWorker.controller){
            // The new SW uses skipWaiting()+clients.claim(); reload once so the
            // page is served by the fresh worker (prevents stale-tab problems).
            nw.postMessage && nw.postMessage("skipWaiting");
          }
        });
      });
    }).catch(()=>{ /* offline cache is optional */ });

    // When the controlling worker changes, reload once to pick up new code.
    let reloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  });
}
