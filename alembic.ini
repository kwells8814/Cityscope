# Alembic config for CityScope.
# The DB URL is injected at runtime from settings (DATABASE_URL) in env.py,
# so we deliberately leave sqlalchemy.url blank here — no secrets in the repo.

[alembic]
script_location = cityscope/db/migrations
prepend_sys_path = .
# sqlalchemy.url is set programmatically in env.py from DATABASE_URL

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
