# Render.com blueprint — push to GitHub, then "New > Blueprint" and pick this repo.
services:
  - type: web
    name: cityscope
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn cityscope.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CITYSCOPE_LIVE_RSS
        value: "true"         # real alt-weekly feeds (no keys needed)
      - key: CITYSCOPE_LIVE_GEOCODE
        value: "true"         # real GPS reverse-geocoding (no keys needed)
      - key: CITYSCOPE_LIVE_BLUESKY
        value: "false"        # dormant — thin results; RSS is the live source
      - key: CITYSCOPE_LIVE_REDDIT
        value: "false"        # Reddit API effectively closed; stays off
      - key: CITYSCOPE_LOG_LEVEL
        value: "INFO"
      # OPTIONAL Bluesky auth — makes Bluesky search reliable from the server.
      # Set these in the Render dashboard (Environment tab), NOT here (secrets):
      #   BLUESKY_HANDLE         e.g. yourname.bsky.social
      #   BLUESKY_APP_PASSWORD   created at bsky.app -> Settings -> App Passwords
      # If left unset, Bluesky uses the public no-auth endpoint as a fallback.
      #
      # Reddit (currently closed) if it ever reopens:
      #   REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, REDDIT_USERNAME
